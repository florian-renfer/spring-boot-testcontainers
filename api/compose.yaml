services:
  mariadb:
    image: 'mariadb:11.4'
    environment:
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=${MARIADB_USER}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
  redis:
    image: 'redis:8-alpine'
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
volumes:
  db_data:
  redis_data:
